<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce CRM URL Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: 40vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 28px;
        }

        .form-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            min-width: 150px;
            flex-shrink: 0;
        }

        label {
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 12px;
            white-space: nowrap;
        }

        input[type="text"],
        select {
            padding: 8px 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            background: white;
            color: #333;
            width: 100%;
        }

        input[type="text"]:focus,
        select:focus {
            outline: 2px solid #ffd700;
        }

        .url-display {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            word-break: break-all;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .url-content {
            flex: 1;
            word-break: break-all;
        }

        .url-variant {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .url-variant-label {
            color: #ffd700;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .copy-btn-small {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .copy-btn-small:hover {
            background: white;
            color: #667eea;
        }

        .category-link-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .category-link-content {
            flex: 1;
        }

        .url-link {
            color: #ffd700;
            text-decoration: none;
            font-weight: 500;
        }

        .url-link:hover {
            text-decoration: underline;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generate {
            background: #ffd700;
            color: #333;
        }

        .btn-generate:hover {
            background: #ffed4e;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }

        .btn-copy:hover {
            background: white;
            color: #667eea;
        }

        .bottom-section {
            height: 60vh;
            background: #f5f5f5;
            overflow: auto;
            position: relative;
            flex-shrink: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: 100%;
            border: none;
        }

        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-size: 18px;
        }

        /* Stage URLs Inline Display */
        #stageUrlsDisplay {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stage-url-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        .stage-url-inline:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .stage-url-inline .url-label {
            font-size: 11px;
            font-weight: 600;
            color: #ffd700;
            white-space: nowrap;
        }

        .stage-url-inline .url-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 12px;
        }

        .stage-url-inline .url-link:hover {
            color: #fff;
            text-decoration: underline;
        }

        .stage-url-inline .copy-btn-tiny {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .stage-url-inline .copy-btn-tiny:hover {
            background: #ffd700;
            color: #333;
        }

        /* Environment Switcher Styles */
        .env-switcher-container {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .env-switcher-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }



        .btn-env-compare {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-env-compare:hover {
            background: white;
            color: #667eea;
        }

        .btn-env-compare:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }



        /* Split iframe view */
        .split-iframe-container {
            display: none;
            height: 100%;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
        }

        .split-iframe-container.active {
            display: grid;
        }

        .iframe-panel {
            position: relative;
            border: 2px solid #667eea;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .iframe-panel-header {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
        }

        .iframe-panel iframe {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
        }
    </style>
</head>

                <div class="form-group">
                    <label for="languageCode">Language Code:</label>
                    <select id="languageCode" onchange="updateEnvironmentSwitcher();">
                        <option value="en-US">en-US</option>
                        <option value="es-US">es-US</option>
                    </select>
                </div>

                <!-- Dynamic field for User Segmentation (US only) -->
                <div class="form-group" id="userTypeGroup" style="display: none;">
                    <label for="userType">User Segmentation:</label>
                    <select id="userType">
                        <option value="">All</option>
                        <option value="free">Free</option>
                        <option value="signed_out">Signed Out</option>
                        <option value="premium">Premium</option>
                        <option value="premium_plus">Premium Plus</option>
                        <option value="select">Select</option>
                    </select>
                </div>

                <!-- Dynamic field for Article URL Name -->
                <div class="form-group" id="articleUrlNameGroup" style="display: none;">
                    <label for="articleUrlName">Article URL Name:</label>
                    <input type="text" id="articleUrlName" placeholder="Enter article URL name">
                </div>

                <!-- Dynamic field for Category Name -->
                <div class="form-group" id="categoryNameGroup" style="display: none;">
                    <label for="categoryName">Category Name:</label>
                    <input type="text" id="categoryName" placeholder="Enter category name">
                </div>

                <!-- Dynamic field for Chat Button ID (get_in_touch only) -->
                <div class="form-group" id="chatButtonIdGroup" style="display: none;">
                    <label for="chatButtonId">Chat Button ID:</label>
                    <select id="chatButtonId" onchange="loadChatWithButtonId()">
                        <option value="">-- Select Button ID --</option>
                    </select>
                </div>
            </div>

            <!-- Hidden base URL field -->
            <input type="hidden" id="baseUrl">

            <div class="button-group" style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <button class="btn-generate" onclick="generateUrl()">🚀 Generate URL</button>
                <button class="btn-generate" id="fetchChatButtonsBtn" onclick="fetchChatButtonIds()" style="display: none; background: #4CAF50;">💬 Fetch Chat Button IDs</button>
                <div id="stageUrlsDisplay" style="display: none; flex: 1; min-width: 300px;">
                    <!-- Stage URLs will be inserted here dynamically -->
                </div>
            </div>

            <div class="url-display" id="urlDisplay">
                <span style="color: rgba(255,255,255,0.7);">Click "Generate URL" to create your link</span>
            </div>

            <!-- Environment Switcher Section -->
            <div class="env-switcher-container" id="envSwitcherContainer" style="display: none;">
                <div class="env-switcher-buttons">
                    <button class="btn-env-compare" onclick="openProdResponse()">
                        � Open Prod response
                    </button>
                    <button class="btn-env-compare" id="openEnglishBtn" onclick="openEnglishResponse()" style="display: none;">
                        🌐 Open English response
                    </button>
                </div>
            </div>

            <!-- Category Links Section (shown only for US + Home) -->
            <div id="categoryLinksSection" style="display: none; margin-top: 20px;">
                <h3 style="margin-bottom: 15px; font-size: 18px;">Category Links:</h3>
                <div id="categoryLinksList" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- Category links will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-section" id="bottomSection">
        <div class="placeholder" id="placeholderText">Click on the generated URL to load the page here</div>

        <!-- Single iframe view -->
        <iframe id="previewFrame" style="display: none;"></iframe>

        <!-- Split iframe view for comparison -->
        <div class="split-iframe-container" id="splitIframeContainer">
            <div class="iframe-panel">
                <div class="iframe-panel-header">Stage Environment</div>
                <iframe id="stageFrame"></iframe>
            </div>
            <div class="iframe-panel">
                <div class="iframe-panel-header">Production Environment</div>
                <iframe id="prodFrame"></iframe>
            </div>
        </div>
    </div>

        // Update environment field visibility
        function updateEnvironmentField() {
            const environment = document.getElementById('environment').value;
            const sandboxNameGroup = document.getElementById('sandboxNameGroup');

            if (environment === 'other') {
                sandboxNameGroup.style.display = 'flex';
            } else {
                sandboxNameGroup.style.display = 'none';
            }

            // Update environment URLs display
            updateEnvironmentUrls();
        }

        // Update territories based on selected proposition
        function updateTerritories() {
            const proposition = document.getElementById('proposition').value;
            const territoryCodeSelect = document.getElementById('territoryCode');

            // Clear existing options
            territoryCodeSelect.innerHTML = '';

            // Get territories for selected proposition
            const territories = propositionTerritoryMapping[proposition] || [];

            // Populate territory dropdown
            territories.forEach(territory => {
                const option = document.createElement('option');
                option.value = territory;
                option.textContent = territory.toUpperCase();
                territoryCodeSelect.appendChild(option);
            });

            // Update language codes and user type field based on new territory
            updateLanguageCodes();
            updateUserTypeField();

            // Update environment URLs display
            updateEnvironmentUrls();
        }

        // Get the base URL based on environment and proposition
        function getBaseUrl(environment, proposition, sandboxName = '') {
            // Handle custom sandbox environment
            if (environment === 'other') {
                if (!sandboxName || sandboxName.trim() === '') {
                    alert('Please enter a sandbox name');
                    return null;
                }

                // Build custom sandbox URL based on proposition
                if (proposition === 'nbcu') {
                    return `https://ott-nbcu--${sandboxName}.sandbox.my.salesforce-sites.com/apex/Help_2_JsonVFP_ViewModelsProvider`;
                } else if (proposition === 'gold') {
                    return `https://now-eu--${sandboxName}.sandbox.my.salesforce-sites.com/apex/Help_2_JsonVFP_ViewModelsProvider`;
                } else if (proposition === 'showtime') {
                    return `https://ott-summer--${sandboxName}.sandbox.my.salesforce-sites.com/apex/Help_2_JsonVFP_ViewModelsProvider`;
                } else if (proposition === 'showmax') {
                    return `https://ott-earth--${sandboxName}.sandbox.my.salesforce-sites.com/apex/Help_2_JsonVFP_ViewModelsProvider`;
                }
            }

            // NBCU uses US URLs
            if (proposition === 'nbcu') {
                if (environment === 'stage') {
                    return 'https://ott-nbcu--stage.sandbox.my.salesforce-sites.com/apex/Help_2_JsonVFP_ViewModelsProvider';
                } else if (environment === 'prod') {
                    return 'https://ott-nbcu.my.salesforce-sites.com/apex/Help_2_JsonVFP_ViewModelsProvider';
                }
            } else if (proposition === 'gold') {
                // Gold uses EU URLs

            if (!baseUrl) {
                return;

            // Handle 'base' view model type - display only base URL

                categoryLinksSection.style.display = 'none';

                // Update environment switcher visibility
                updateEnvironmentSwitcher();

                return;
            }

            // Build the URL with query parameters based on view model type
            let params = new URLSearchParams();
            params.append('view_model_type', viewModelType);
            params.append('territory_code', territoryCode);

            // Only add language_code for US territory
            if (territoryCode === 'us') {
                params.append('language_code', languageCode);

            // Add user type parameter if territory is US and view model type is home
            if (territoryCode === 'us' && viewModelType === 'home') {

                params.append('view_model_type', 'article');
                params.append('article_key', articleUrlName);
                params.append('territory_code', territoryCode);

                params = new URLSearchParams();
                params.append('view_model_type', 'category');
                params.append('category_key', categoryName);
                params.append('territory_code', territoryCode);

                // Only add language_code for US territory
                if (territoryCode === 'us') {
                    params.append('language_code', languageCode);
                }

            generatedUrl = `${baseUrl}?${params.toString()}`;

            // Display the URL as a clickable link with copy button

                withLangVariant.appendChild(withLangContent);

                // URL without language_code

        // Fetch Chat Button IDs from the generated get_in_touch URL
        function fetchChatButtonIds() {
            if (!generatedUrl) {
                alert('Please generate a URL first by clicking "Generate URL"');
                return;
            }

            const chatButtonIdSelect = document.getElementById('chatButtonId');
            const fetchBtn = document.getElementById('fetchChatButtonsBtn');

            // Show loading state
            chatButtonIdSelect.innerHTML = '<option value="">-- Loading... --</option>';
            fetchBtn.textContent = '⏳ Fetching...';
            fetchBtn.disabled = true;

            // Fetch the JSON from the generated URL
            fetch(generatedUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    // Extract chat button IDs from the JSON response
                    const buttonIds = extractChatButtonIds(data);
                    populateChatButtonDropdown(buttonIds);

                    // Reset button state
                    fetchBtn.textContent = '💬 Fetch Chat Button IDs';
                    fetchBtn.disabled = false;
                })
                .catch(error => {
                    console.error('Error fetching chat button IDs:', error);
                    chatButtonIdSelect.innerHTML = '<option value="">-- Error: Could not fetch --</option>';
                    fetchBtn.textContent = '💬 Fetch Chat Button IDs';
                    fetchBtn.disabled = false;
                    alert('Error fetching JSON. Please check the console for details.\n\nYou may need to open the URL directly in a new tab to view the JSON response.');
                });
        }

        // Extract chatButtonIdNotSignedIn and chatButtonIdSignedIn from JSON response
        function extractChatButtonIds(data) {
            const buttonIds = [];

            // Search through the entire JSON structure for chat button IDs
            function searchForButtonIds(obj, path = '') {
                if (obj === null || obj === undefined) return;

                if (typeof obj === 'object') {
                    // Check if this object has chatButtonIdNotSignedIn or chatButtonIdSignedIn
                    if (obj.chatButtonIdNotSignedIn) {
                        const serviceType = obj.serviceType || path || 'Unknown';
                        buttonIds.push({
                            id: obj.chatButtonIdNotSignedIn,
                            label: `${serviceType} - Not Signed In: ${obj.chatButtonIdNotSignedIn}`
                        });
                    }
                    if (obj.chatButtonIdSignedIn) {
                        const serviceType = obj.serviceType || path || 'Unknown';
                        buttonIds.push({
                            id: obj.chatButtonIdSignedIn,
                            label: `${serviceType} - Signed In: ${obj.chatButtonIdSignedIn}`
                        });
                    }

                    // Recursively search through all properties
                    if (Array.isArray(obj)) {
                        obj.forEach((item, index) => searchForButtonIds(item, path));
                    } else {
                        Object.keys(obj).forEach(key => {
                            searchForButtonIds(obj[key], key);
                        });
                    }
                }
            }

            searchForButtonIds(data);
            return buttonIds;
        }

        // Populate chat button dropdown with extracted button IDs
        function populateChatButtonDropdown(buttonIds) {
            const chatButtonIdSelect = document.getElementById('chatButtonId');

            // Reset dropdown
            chatButtonIdSelect.innerHTML = '<option value="">-- Select Button ID --</option>';

            // Remove duplicates based on ID
            const uniqueButtonIds = buttonIds.filter((item, index, self) =>
                index === self.findIndex(t => t.id === item.id)
            );

            // Add options if button IDs exist
            uniqueButtonIds.forEach(buttonIdObj => {
                const option = document.createElement('option');
                option.value = buttonIdObj.id;
                option.textContent = buttonIdObj.label;
                chatButtonIdSelect.appendChild(option);
            });

            // If no button IDs found
            if (uniqueButtonIds.length === 0) {
                chatButtonIdSelect.innerHTML = '<option value="">-- No Button IDs Found in Response --</option>';
            }
        }

        function loadUrl() {
            if (!generatedUrl) {
                alert('Please generate a URL first!');
                return;
            }

            // Hide split view and show single iframe
            hideSplitView();

            // Load the URL in the single iframe
            const previewFrame = document.getElementById('previewFrame');
            const placeholder = document.getElementById('placeholderText');

            placeholder.style.display = 'none';
            previewFrame.style.display = 'block';
            previewFrame.src = generatedUrl;
        }

        function loadUrlDirect(url) {
            // Hide split view and show single iframe
            hideSplitView();

            // Load a specific URL in the single iframe
            const previewFrame = document.getElementById('previewFrame');
            const placeholder = document.getElementById('placeholderText');

            placeholder.style.display = 'none';
            previewFrame.style.display = 'block';
            previewFrame.src = url;
        }

        function hideSplitView() {
            document.getElementById('splitIframeContainer').classList.remove('active');
        }

        function showSplitView() {
            document.getElementById('placeholderText').style.display = 'none';
            document.getElementById('previewFrame').style.display = 'none';
            document.getElementById('splitIframeContainer').classList.add('active');
        }

        // Environment Switcher Functions
        function updateEnvironmentSwitcher() {
            const environment = document.getElementById('environment').value;
            const proposition = document.getElementById('proposition').value;
            const territoryCode = document.getElementById('territoryCode').value;
            const languageCode = document.getElementById('languageCode').value;
            const envSwitcherContainer = document.getElementById('envSwitcherContainer');
            const openEnglishBtn = document.getElementById('openEnglishBtn');

            // Only show switcher for stage (not for prod or "other")
            if (environment === 'stage') {
                envSwitcherContainer.style.display = 'block';

                // Hide "Open English response" button if language code is 'en-US'
                if (languageCode === 'en-US') {
                    openEnglishBtn.style.display = 'none';
                } else {
                    // Determine if "Open English response" button should be shown
                    let showEnglishButton = false;

                    if (proposition === 'nbcu') {
                        // Always show for NBCU when language is not en-US
                        showEnglishButton = true;
                    } else if (proposition === 'gold') {
                        // Show only if territory is NOT gb or ie
                        showEnglishButton = (territoryCode !== 'gb' && territoryCode !== 'ie');
                    } else if (proposition === 'showmax') {
                        // Show only if territory is NOT ng
                        showEnglishButton = (territoryCode !== 'ng');
                    }

                    if (showEnglishButton) {
                        openEnglishBtn.style.display = 'inline-block';
                    } else {
                        openEnglishBtn.style.display = 'none';
                    }
                }
            } else {
                envSwitcherContainer.style.display = 'none';
            }
        }

        function openProdResponse() {
            // Get current environment
            const currentEnv = document.getElementById('environment').value;

            // Generate URLs for current environment and production
            const currentUrl = generateUrlForEnvironment(currentEnv);
            const prodUrl = generateUrlForEnvironment('prod');

            if (!currentUrl || !prodUrl) {
                alert('Unable to generate URLs');
                return;
            }

            // Load both URLs in split view
            showSplitView();

            // Update panel headers based on current environment
            const leftPanelHeader = document.querySelector('.iframe-panel:first-child .iframe-panel-header');
            if (currentEnv === 'stage') {
                leftPanelHeader.textContent = 'Stage Environment';
            } else {
                leftPanelHeader.textContent = 'Current Environment';
            }

            document.getElementById('stageFrame').src = currentUrl;
            document.getElementById('prodFrame').src = prodUrl;
        }

        function openEnglishResponse() {
            // Get current environment and proposition
            const currentEnv = document.getElementById('environment').value;
            const proposition = document.getElementById('proposition').value;

            // Determine English territory based on proposition
            let englishTerritory = '';
            if (proposition === 'nbcu') {
                englishTerritory = 'us';
            } else if (proposition === 'gold') {
                englishTerritory = 'gb';
            } else if (proposition === 'showmax') {
                englishTerritory = 'ng';
            }

            // Generate URLs for current territory and English territory
            const currentUrl = generateUrlForEnvironment(currentEnv);
            const englishUrl = generateUrlForEnvironmentWithTerritory(currentEnv, englishTerritory);

            if (!currentUrl || !englishUrl) {
                alert('Unable to generate URLs');
                return;
            }

            // Load both URLs in split view
            showSplitView();

            // Update panel headers
            const leftPanelHeader = document.querySelector('.iframe-panel:first-child .iframe-panel-header');
            const rightPanelHeader = document.querySelector('.iframe-panel:last-child .iframe-panel-header');

            const currentTerritory = document.getElementById('territoryCode').value;
            leftPanelHeader.textContent = `Current Territory (${currentTerritory.toUpperCase()})`;
            rightPanelHeader.textContent = `English Territory (${englishTerritory.toUpperCase()})`;

            document.getElementById('stageFrame').src = currentUrl;
            document.getElementById('prodFrame').src = englishUrl;
        }

        function generateUrlForEnvironment(targetEnvironment) {
            const viewModelType = document.getElementById('viewModelType').value;
            const proposition = document.getElementById('proposition').value;
            const territoryCode = document.getElementById('territoryCode').value;
            const languageCode = document.getElementById('languageCode').value;

            // Get base URL for the target environment
            const baseUrl = getBaseUrl(targetEnvironment, proposition, '');

            if (!baseUrl) {
                return null;
            }

            // For 'base' view model type, return only the base URL
            if (viewModelType === 'base') {
                return baseUrl;
            }

            // Build the URL with query parameters
            let params = new URLSearchParams();
            params.append('view_model_type', viewModelType);
            params.append('territory_code', territoryCode);

            // Only add language_code for US territory
            if (territoryCode === 'us') {
                params.append('language_code', languageCode);
            }

            // Add user type parameter if territory is US and view model type is home
            if (territoryCode === 'us' && viewModelType === 'home') {
                const userType = document.getElementById('userType').value;
                if (userType) {
                    params.append('user_type', userType);
                }
            }

            // Add specific parameters based on view model type
            if (viewModelType === 'article') {
                const articleUrlName = document.getElementById('articleUrlName').value.trim();
                if (!articleUrlName) {
                    return null;
                }
                params = new URLSearchParams();
                params.append('view_model_type', 'article');
                params.append('article_key', articleUrlName);
                params.append('territory_code', territoryCode);
                if (territoryCode === 'us') {
                    params.append('language_code', languageCode);
                }
            } else if (viewModelType === 'category') {
                const categoryName = document.getElementById('categoryName').value.trim();
                if (!categoryName) {
                    return null;
                }
                params = new URLSearchParams();
                params.append('view_model_type', 'category');
                params.append('category_key', categoryName);
                params.append('territory_code', territoryCode);
                if (territoryCode === 'us') {
                    params.append('language_code', languageCode);
                }
            }

            return `${baseUrl}?${params.toString()}`;
        }

        function generateUrlForEnvironmentWithTerritory(targetEnvironment, customTerritory) {
            const viewModelType = document.getElementById('viewModelType').value;
            const proposition = document.getElementById('proposition').value;

            // For English response, always use 'en-US' for US territory
            const languageCode = 'en-US';

            // Get base URL for the target environment
            const baseUrl = getBaseUrl(targetEnvironment, proposition, '');

            if (!baseUrl) {
                return null;
            }

            // For 'base' view model type, return only the base URL
            if (viewModelType === 'base') {
                return baseUrl;
            }

            // Build the URL with query parameters
            let params = new URLSearchParams();
            params.append('view_model_type', viewModelType);
            params.append('territory_code', customTerritory);

            // Only add language_code for US territory (always en-US for English response)
            if (customTerritory === 'us') {
                params.append('language_code', languageCode);
            }

            // Add user type parameter if territory is US and view model type is home
            if (customTerritory === 'us' && viewModelType === 'home') {
                const userType = document.getElementById('userType').value;
                if (userType) {
                    params.append('user_type', userType);
                }
            }

            // Add specific parameters based on view model type
            if (viewModelType === 'article') {
                const articleUrlName = document.getElementById('articleUrlName').value.trim();
                if (!articleUrlName) {
                    return null;
                }
                params = new URLSearchParams();
                params.append('view_model_type', 'article');
                params.append('article_key', articleUrlName);
                params.append('territory_code', customTerritory);
                if (customTerritory === 'us') {
                    params.append('language_code', languageCode);
                }
            } else if (viewModelType === 'category') {
                const categoryName = document.getElementById('categoryName').value.trim();
                if (!categoryName) {
                    return null;
                }
                params = new URLSearchParams();
                params.append('view_model_type', 'category');
                params.append('category_key', categoryName);
                params.append('territory_code', customTerritory);
                if (customTerritory === 'us') {
                    params.append('language_code', languageCode);
                }
            }

            return `${baseUrl}?${params.toString()}`;
        }
